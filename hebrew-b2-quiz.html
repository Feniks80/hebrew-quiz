if(showed){if(isOk){o.style.background="#dcfce7";o.style.borderColor="#22c55e";o.style.color="#166534";o.style.fontWeight="600"}else if(isSel){o.style.background="#fee2e2";o.style.borderColor="#ef4444";o.style.color="#991b1b"}else{o.style.background="#f8fafc";o.style.color="#94a3b8"}o.style.cursor="default"}
app.appendChild(o)});
if(showed){app.appendChild(h("div","info",`<span style="direction:rtl;display:inline"><b>${q.item[1]}</b></span> = ${q.item[2]} = ${q.item[0]}`));
const nb=h("button","btn","",{onclick:()=>{if(ci+1>=qs.length){if(!errMode&&curQi>=0){prog[curQi]=Math.round(resOk.length/qs.length*100);saveProg()}render("result");return}ci++;pick=null;showed=false;render("quiz")},style:{background:cat.c,color:"#fff"}});nb.textContent=ci+1>=qs.length?"Результаты":"Дальше";app.appendChild(nb)}
return}
if(page==="result"){const total2=resOk.length+resBad.length;const pct=total2>0?Math.round(resOk.length/total2*100):0;const cat=curQi<0?{c:"#7c3aed"}:getCat(curQi);const qName=errMode?"Работа над ошибками":curQi<0?"Случайный микс":Q[curQi][0];
app.innerHTML=`<div style="text-align:center;margin-bottom:16px"><div style="font-size:42px;font-weight:800;color:${pct>=70?"#16a34a":pct>=40?"#d97706":"#dc2626"}">${pct}%</div><div style="font-size:14px;color:#64748b">${resOk.length} / ${total2} правильно</div><div style="font-size:13px;color:#94a3b8;margin-top:2px">${qName}</div></div>`;
if(resBad.length>0){const eb=h("div","",`<div style="font-size:14px;font-weight:600;color:#dc2626;margin-bottom:8px">Ошибки (${resBad.length})</div>`);resBad.forEach(item=>{eb.appendChild(h("div","err-card",`<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600;color:#991b1b">${item[0]}</span><span style="direction:rtl;font-size:16px;font-weight:600">${item[1]}</span></div><div style="color:#b91c1c;margin-top:2px">${item[2]}</div>`))});eb.style.marginBottom="16px";app.appendChild(eb)}
if(resOk.length>0){const det=h("details","","");det.innerHTML=`<summary style="font-size:14px;font-weight:600;color:#16a34a;margin-bottom:6px">Правильные (${resOk.length})</summary>`;resOk.forEach(item=>{det.appendChild(h("div","",item[0]+` = <span style="direction:rtl">${item[1]}</span> = `+item[2],{style:{padding:"6px",fontSize:"12px",color:"#64748b",borderBottom:"1px solid #f1f5f9"}}))});det.style.marginBottom="16px";app.appendChild(det)}
const btns=h("div","",null,{style:{display:"flex",gap:"8px",flexWrap:"wrap"}});
btns.appendChild(h("button","btn","Меню",{onclick:()=>render("menu"),style:{flex:"1",minWidth:"100px",background:"#fff",color:"#475569",border:"1px solid #e2e8f0"}}));
if(resBad.length>0)btns.appendChild(h("button","btn",`Ошибки (${resBad.length})`,{onclick:()=>startErrors(resBad),style:{flex:"1",minWidth:"100px",background:"#dc2626",color:"#fff"}}));
const retry=h("button","btn","",{onclick:()=>{curQi<0?startRandom():startQuiz(curQi)},style:{flex:"1",minWidth:"100px",background:cat.c,color:"#fff"}});retry.textContent=curQi<0?"Новый микс":"Заново";btns.appendChild(retry);app.appendChild(btns)}
}
function buildQs(items){return sh(items.map(item=>{const heRu=dir==="he"||(dir==="mix"&&Math.random()>0.5);return{item,heRu,opts:mkO(item,heRu?0:1)}}))}
function startQuiz(idx){curQi=idx;qs=buildQs(Q[idx][1]);ci=0;pick=null;showed=false;resOk=[];resBad=[];errMode=false;render("quiz")}
function startRandom(){curQi=-1;qs=buildQs(sh(pool).slice(0,rndSize));ci=0;pick=null;showed=false;resOk=[];resBad=[];errMode=false;render("quiz")}
function startErrors(items){qs=buildQs(items);ci=0;pick=null;showed=false;resOk=[];resBad=[];errMode=true;render("quiz")}
render("menu");
</script>
</body>
</html>
